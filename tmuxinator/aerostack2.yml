name: drone0
attach: true
root: ./
startup_window: mission
windows:
  # Basic Robotics Functions
  - brf:
      panes:
        - ros2 launch as2_gazebo_assets launch_simulation.py
            use_sim_time:=true
            simulation_config_file:=config/gazebo/world.yaml
        - ros2 launch as2_platform_gazebo platform_gazebo_launch.py
            namespace:=drone0
            use_sim_time:=true
            platform_config_file:=config/config.yaml
            simulation_config_file:=config/gazebo/world.yaml
        - ros2 launch as2_state_estimator state_estimator_launch.py
            namespace:=drone0
            use_sim_time:=true
            config_file:=config/config.yaml
        - ros2 launch as2_motion_controller controller_launch.py
            namespace:=drone0
            use_sim_time:=true
            config_file:=config/config.yaml

  # Behaviors
  - bh:
      panes:
        - ros2 launch as2_behaviors_motion motion_behaviors_launch.py
            namespace:=drone0
            use_sim_time:=true
            config_file:=config/config.yaml

  # Navigation
  - nav:
      panes:
        # - ros2 launch as2_map_server scan2occ_grid-map_server.launch.py
        #     namespace:=drone0
        #     use_sim_time:=true
        # - ros2 launch as2_map_server depth2occ_grid-map_server.launch.py
        #     namespace:=drone0
        #     use_sim_time:=true
        - ros2 launch as2_map_server point_cloud2occ_grid-map_server.launch.py
            namespace:=drone0
            use_sim_time:=true
        - ros2 launch as2_behaviors_path_planning path_planner_behavior_launch.py
            namespace:=drone0
            use_sim_time:=true
            plugin_name:=a_star

  # Mission execution
  - mission:
      panes:
        - ros2 run as2_alphanumeric_viewer as2_alphanumeric_viewer_node
            --ros-args -r  __ns:=/drone0 -p use_sim_time:=true
        - python3 mission/mission_click_to_navigate.py
        # - python3 mission/mission_path_planner_test.py
 
  # Visualization
  - visualization:
      panes:
        - ros2 launch as2_visualization as2_visualization.launch.py
            namespace:=drone0
            use_sim_time:=true
            drone_model:=f330
            rviz_config:=config/rviz_config.rviz

